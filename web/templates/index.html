<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏭 工业质量统计工具</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Theme CSS -->
    <link href="{{ url_for('static', filename='css/industrial-theme.css') }}" rel="stylesheet">
    <!-- Theme Upgrade (Dark Mode + ECharts) -->
    <link href="{{ url_for('static', filename='css/industrial-theme-upgrade.css') }}" rel="stylesheet">
    <style>
        /* 保持现有样式, 覆盖主要颜色 */
        :root {
            --primary: #0052cc;
            --primary-hover: #0747a6;
        }
        
        body {
            background: var(--bg-body);
            font-family: var(--font-sans);
        }
        
        .main-header {
            background: var(--primary);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            margin-bottom: var(--space-xl);
            overflow: hidden;
        }
        
        .main-header .header-content {
            padding: var(--space-xl);
            text-align: center;
        }
        
        .main-header h1 {
            font-weight: 700;
            margin-bottom: var(--space-sm);
            font-size: 2.25rem;
        }
        
        .main-header .subtitle {
            opacity: 0.9;
            font-size: 1.1rem;
            color: var(--gray-600);
        }
    </style>
    <style>
        .file-upload-area {
            border: 3px dashed var(--gray-300);
            border-radius: var(--radius-lg);
            padding: var(--space-2xl) var(--space-lg);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-base);
            background: var(--gray-50);
        }
        
        .file-upload-area:hover,
        .file-upload-area.drag-over {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: scale(1.005);
        }
        
        .file-upload-area i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: var(--space-lg);
        }
        .file-upload-area h4 {
            color: var(--gray-700);
            margin-bottom: var(--space-sm);
        }
        .file-upload-area p {
            color: var(--gray-500);
            margin-bottom: 0;
        }
        
        .column-tag {
            composes: tag from industrial-theme.css;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            padding: var(--space-sm) var(--space-md);
        }
        .column-tag.selected {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .column-tag i {
            font-size: 0.9rem;
        }
        
        .form-label {
            composes: form-label from industrial-theme.css;
            margin-bottom: var(--space-sm);
        }
        
        .form-select, .form-control {
            composes: form-control from industrial-theme.css;
            border-radius: var(--radius-md);
            padding: var(--space-md) var(--space-lg);
            font-size: 1rem;
            transition: var(--transition-fast);
        }
        .form-select:focus, .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        
        .btn-primary {
            composes: btn-primary from industrial-theme.css;
            font-size: 1.1rem;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
            transform: none;
        }
        
        #results {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-section {
            composes: result-section from industrial-theme.css;
        }
        
        .result-image {
            composes: result-image from industrial-theme.css;
        }
        .result-pdf {
            composes: result-pdf from industrial-theme.css;
        }
        .result-text {
            background: var(--gray-800);
            color: var(--gray-300);
            padding: var(--space-lg);
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.6;
            overflow-x: auto;
        }
        
        .badge-chart {
            composes: badge from industrial-theme.css;
            background: var(--primary);
            color: white;
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
        }
        
        .loader {
            display: none;
            text-align: center;
            padding: 3rem;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--gray-200);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        .alert-custom {
            border: none;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
        }
        
        .alert-success-custom {
            background: var(--success-light);
            color: var(--success);
        }
        .alert-error-custom {
            background: var(--danger-light);
            color: var(--danger);
        }
        
        .section-title {
            composes: h3 from industrial-theme.css;
            display: flex;
            align-items: center;
            gap: var(--space-md);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: var(--space-lg);
        }
        .section-title i {
            color: var(--primary);
        }
        .file-info-box {
            composes: result-section from industrial-theme.css;
            background: var(--primary-light);
            border: 1px solid var(--primary);
            border-left-width: 4px;
            margin-top: var(--space-md);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            text-align: center;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            font-family: var(--font-mono);
        }
        .stat-label {
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-top: var(--space-xs);
        }
        
        @media (max-width: 768px) {
            .main-header .header-content {
                padding: var(--space-lg);
            }
            .main-header h1 {
                font-size: 1.5rem;
            }
            .container-industrial {
                padding-left: var(--space-md);
                padding-right: var(--space-md);
            }
        }
    </style>
</head>
<body>
    <div class="container-industrial py-4">
        <!-- 主导航栏 -->
        <nav class="main-nav">
            <div class="nav-brand">
                <i class="bi bi-graph-up-arrow"></i>
                <span>工业质量统计</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="upload"><i class="bi bi-cloud-arrow-up"></i> 数据上传</li>
                <li class="nav-item" data-page="analysis"><i class="bi bi-sliders"></i> 分析工作台</li>
                <li class="nav-item" data-page="reports"><i class="bi bi-file-earmark-check"></i> 报告中心</li>
                <li class="nav-item" data-page="settings"><i class="bi bi-gear"></i> 设置</li>
                <li class="nav-item" id="theme-toggle"><i class="bi bi-moon"></i> 主题</li>
            </ul>
        </nav>
        
        <!-- 页面内容区域 -->
        <div id="page-upload" class="page-content">
        <!-- Header -->
        <div class="main-header">
            <div class="header-content">
                <h1><i class="bi bi-gear-wide-connected"></i> 工业质量统计工具</h1>
                <p class="subtitle">Industrial Quality Statistics - 专业统计分析平台</p>
            </div>
        </div>

        <!-- File Upload Card -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-upload"></i> 上传 CSV 数据
            </div>
            <div class="card-body">
                <div class="file-upload-area" onclick="document.getElementById('file-input').click()" id="drop-zone">
                    <i class="bi bi-cloud-arrow-up"></i>
                    <h4>点击选择 CSV 文件，或拖拽文件到这里</h4>
                    <p class="text-muted">支持标准 CSV 格式，自动处理注释行 (#)</p>
                    <input type="file" id="file-input" accept=".csv" class="d-none" onchange="handleFileSelect(event)">
                </div>
                <div id="file-info" class="file-info-box" style="display: none;"></div>
            </div>
        </div>

        <!-- Analysis Card -->
        <div class="card" id="analysis-card" style="display: none;">
            <div class="card-header">
                <i class="bi bi-sliders"></i> 选择分析参数
            </div>
            <div class="card-body">
                <!-- Column Selection -->
                <div class="mb-4">
                    <label class="form-label">📊 数据列（点击选择）:</label>
                    <div id="column-list" class="d-flex flex-wrap gap-2"></div>
                </div>
                
                <!-- Analysis Type -->
                <div class="mb-3">
                    <label class="form-label">🔧 分析类型:</label>
                    <select class="form-select" id="analysis-type" onchange="updateAnalysisOptions()">
                        <option value="report">📋 完整报告 (recommended)</option>
                        <option value="stats">📈 基础统计</option>
                        <option value="spc">📉 SPC 控制图</option>
                        <option value="assess">📊 评估图</option>
                        <option value="heatmap">🔥 热力图</option>
                        <option value="regression">📐 回归分析</option>
                        <option value="capability">🎯 过程能力分析</option>
                    </select>
                </div>
                
                <!-- Subgroup Size (SPC) -->
                <div class="mb-3" id="subgroup-size-group" style="display: none;">
                    <label class="form-label">子组大小 (SPC):</label>
                    <input type="number" class="form-control" id="subgroup-size" value="5" min="2" max="20">
                </div>
                
                <!-- Chart Type (Assess) -->
                <div class="mb-3" id="chart-type-group" style="display: none;">
                    <label class="form-label">评估图类型:</label>
                    <select class="form-select" id="chart-type">
                        <option value="histogram">📊 直方图</option>
                        <option value="boxplot">📦 箱线图</option>
                        <option value="qqplot">📈 QQ图</option>
                        <option value="stemleaf">📝 茎叶图</option>
                        <option value="timeseries">📅 时间序列图</option>
                        <option value="pareto">📊 帕累托图</option>
                    </select>
                </div>
                
                <!-- Regression Inputs -->
                <div class="mb-3" id="regression-inputs" style="display: none;">
                    <label class="form-label">回归分析变量:</label>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="text" class="form-control" id="regression-x" placeholder="自变量 X 列名">
                        </div>
                        <div class="col-md-6">
                            <input type="text" class="form-control" id="regression-y" placeholder="因变量 Y 列名">
                        </div>
                    </div>
                </div>
                
                <!-- Spec Limits -->
                <div class="mb-4" id="spec-limits-group" style="display: none;">
                    <label class="form-label">规格限 (LSL/USL):</label>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="input-group">
                                <span class="input-group-text">LSL</span>
                                <input type="number" class="form-control" id="lsl" placeholder="下限规格" step="any">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group">
                                <span class="input-group-text">USL</span>
                                <input type="number" class="form-control" id="usl" placeholder="上限规格" step="any">
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Analyze Button -->
                <button class="btn btn-primary w-100" id="analyze-btn" onclick="runAnalysis()">
                    <i class="bi bi-play-circle"></i> 生成分析
                </button>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div class="loader" id="loading">
            <div class="spinner"></div>
            <h4>正在生成分析报告...</h4>
            <p class="text-muted">请稍候，系统正在处理您的数据</p>
        </div>

        <!-- Results -->
        <div id="results">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-check-circle"></i> 分析结果
                </div>
                <div class="card-body">
                    <div id="result-content" class="result-content-wrapper">
                <!-- 内置 loading -->
                <div id="result-loading" class="loading-overlay" style="display: none;">
                    <div class="spinner"></div>
                </div>
                
                <!-- Tab 导航 -->
                <div class="result-tabs" id="result-tabs" style="display: none;">
                    <button class="result-tab active" data-tab="report">📋 报告</button>
                    <button class="result-tab" data-tab="stats">📊 统计</button>
                    <button class="result-tab" data-tab="charts">📈 图表</button>
                </div>
                
                <!-- Tab 面板内容 -->
                <div id="panel-report" class="result-panel active"></div>
                <div id="panel-stats" class="result-panel"></div>
                <div id="panel-charts" class="result-panel"></div>
            </div>
                </div>
            </div>
        </div>

        <!-- Error Container -->
        <div id="error-container"></div>
        </div> <!-- 结束 page-upload -->
        
        <!-- 其他页面 (占位) -->
        <div id="page-analysis" class="page-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-sliders"></i> 分析工作台 (开发中)
                </div>
                <div class="card-body">
                    <p class="text-muted">此功能正在开发中，敬请期待...</p>
                </div>
            </div>
        </div>
        
        <div id="page-reports" class="page-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-file-earmark-check"></i> 报告中心 (开发中)
                </div>
                <div class="card-body">
                    <p class="text-muted">历史报告下载与管理功能即将上线。</p>
                </div>
            </div>
        </div>
        
        <div id="page-settings" class="page-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-gear"></i> 设置 (开发中)
                </div>
                <div class="card-body">
                    <p class="text-muted">系统配置页面正在建设中。</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let selectedColumn = null;
        let currentFilename = null;
        
        // === 导航切换 ===
        function switchPage(pageName) {
            // 更新导航项状态
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-page') === pageName) {
                    item.classList.add('active');
                }
            });
            
            // 显示对应页面（这里简单隐藏所有页面并显示目标）
            const pages = ['upload', 'analysis', 'reports', 'settings'];
            pages.forEach(p => {
                const el = document.getElementById('page-' + p);
                if (el) el.style.display = (p === pageName) ? 'block' : 'none';
            });
        }
        
        // 导航项点击事件绑定
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.getAttribute('data-page');
                    if (page) switchPage(page);
                });
            });
        });
        
        // Drag and drop support
        const dropZone = document.getElementById('drop-zone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
            dropZone.style.background = 'var(--primary-light)';
        });
        
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--gray-300)';
            dropZone.style.background = 'var(--gray-50)';
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--gray-300)';
            dropZone.style.background = 'var(--gray-50)';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                handleFile(file);
            }
        }
        
        async function handleFile(file) {
            if (!file.name.endsWith('.csv')) {
                alert('请上传CSV文件');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                currentFilename = result.filename;
                displayColumns(result.columns);
                document.getElementById('file-info').innerHTML = `
                    <div class="d-flex align-items-center gap-2">
                        <i class="bi bi-file-earmark-check text-success"></i>
                        <strong>${result.filename}</strong>
                        <span class="badge bg-success">✅ 已上传</span>
                        <span class="text-muted">行数: ${result.rows} | 列数: ${result.columns.length}</span>
                    </div>
                `;
                document.getElementById('file-info').style.display = 'block';
                document.getElementById('analysis-card').style.display = 'block';
                
            } catch (error) {
                alert('上传失败: ' + error.message);
            }
        }
        
        function displayColumns(columns) {
            const container = document.getElementById('column-list');
            container.innerHTML = '';
            
            columns.forEach(col => {
                const tag = document.createElement('div');
                tag.className = 'column-tag';
                tag.innerHTML = `<i class="bi bi-plus-circle"></i> ${col}`;
                tag.onclick = () => selectColumn(col, tag);
                container.appendChild(tag);
            });
        }
        
        function selectColumn(column, element) {
            // Remove previous selection
            document.querySelectorAll('.column-tag').forEach(t => {
                t.classList.remove('selected');
                t.innerHTML = `<i class="bi bi-plus-circle"></i> ${t.textContent.trim()}`;
            });
            
            // Mark selected
            element.classList.add('selected');
            element.innerHTML = `<i class="bi bi-check-circle"></i> ${column}`;
            selectedColumn = column;
        }
        
        function updateAnalysisOptions() {
            const type = document.getElementById('analysis-type').value;
            
            // Hide all conditional options
            document.getElementById('subgroup-size-group').style.display = 'none';
            document.getElementById('chart-type-group').style.display = 'none';
            document.getElementById('regression-inputs').style.display = 'none';
            document.getElementById('spec-limits-group').style.display = 'none';
            
            // Show relevant options
            if (type === 'spc') {
                document.getElementById('subgroup-size-group').style.display = 'block';
            } else if (type === 'assess') {
                document.getElementById('chart-type-group').style.display = 'block';
            } else if (type === 'regression') {
                document.getElementById('regression-inputs').style.display = 'block';
            } else if (type === 'report' || type === 'capability') {
                document.getElementById('spec-limits-group').style.display = 'block';
            }
        }
        
        async function runAnalysis() {
            if (!selectedColumn) {
                alert('请先选择一个数据列');
                return;
            }
            
            const data = {
                filename: currentFilename,
                column: selectedColumn,
                type: document.getElementById('analysis-type').value
            };
            
            // Add optional parameters
            const chartType = document.getElementById('chart-type');
            if (chartType && chartType.value) {
                data.chart_type = chartType.value;
            }
            
            const xInput = document.getElementById('regression-x');
            const yInput = document.getElementById('regression-y');
            if (xInput.value && yInput.value) {
                data.x = xInput.value;
                data.y = yInput.value;
            }
            
            const lsl = document.getElementById('lsl');
            const usl = document.getElementById('usl');
            if (lsl.value) data.lsl = parseFloat(lsl.value);
            if (usl.value) data.usl = parseFloat(usl.value);
            
            const subgroupSize = document.getElementById('subgroup-size');
            if (subgroupSize && subgroupSize.value) {
                data.subgroup_size = parseInt(subgroupSize.value);
            }
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('analyze-btn').disabled = true;
            document.getElementById('analyze-btn').innerHTML = '<i class="bi bi-hourglass-split"></i> 处理中...';
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                displayResults(result);
                
            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('analyze-btn').disabled = false;
                document.getElementById('analyze-btn').innerHTML = '<i class="bi bi-play-circle"></i> 生成分析';
            }
        }
        
        function displayResults(result) {
            const loading = document.getElementById('result-loading');
            const tabs = document.getElementById('result-tabs');
            const panelReport = document.getElementById('panel-report');
            const panelStats = document.getElementById('panel-stats');
            const panelCharts = document.getElementById('panel-charts');
            
            loading.style.display = 'flex';
            tabs.style.display = 'none';
            
            setTimeout(() => {
                loading.style.display = 'none';
                tabs.style.display = 'flex';
                
                // Panel: 报告
                panelReport.innerHTML = '';
                if (result.session) {
                    panelReport.innerHTML += `
                        <div class="alert alert-info alert-custom mb-3">
                            <i class="bi bi-key"></i> <strong>会话 ID:</strong> ${result.session}
                        </div>
                    `;
                }
                if (result.text) {
                    panelReport.innerHTML += `
                        <div class="result-section">
                            <div class="result-text">${escapeHtml(result.text)}</div>
                        </div>
                    `;
                }
                if (!result.text && !result.session && !result.result && !result.files) {
                    panelReport.innerHTML += `<p class="text-muted">暂无报告内容</p>`;
                }
                
                // Panel: 统计
                panelStats.innerHTML = '';
                if (result.result && Object.keys(result.result).length > 0) {
                    let statsHtml = '';
                    if (result._meta && result._meta.analysis_type === 'stats') {
                        statsHtml += `
                            <div class="result-section">
                                <h4><i class="bi bi-bar-chart"></i> 数据分布预览</h4>
                                <div id="distribution-chart-container" class="chart-container" style="height: 250px;"></div>
                            </div>
                        `;
                    }
                    statsHtml += '<div class="result-section"><h4><i class="bi bi-bar-chart"></i> 统计摘要</h4><div class="stats-grid">';
                    const labels = { count:'样本数', mean:'平均值', std:'标准差', min:'最小值', max:'最大值', cv:'变异系数' };
                    for (const [key, value] of Object.entries(result.result)) {
                        const label = labels[key] || key;
                        const displayValue = typeof value === 'number' ? (key === 'cv' ? `${(value*100).toFixed(2)}%` : value.toFixed(4)) : value;
                        statsHtml += `
                            <div class="stat-card">
                                <div class="stat-value">${displayValue}</div>
                                <div class="stat-label">${label}</div>
                            </div>
                        `;
                    }
                    statsHtml += '</div></div>';
                    panelStats.innerHTML += statsHtml;
                    if (result._meta && result._meta.analysis_type === 'stats') {
                        fetchAndRenderDistributionChart(result._meta);
                    }
                } else {
                    panelStats.innerHTML += `<p class="text-muted">暂无统计数据</p>`;
                }
                
                // Panel: 图表
                panelCharts.innerHTML = '';
                if (result.files && result.files.length > 0) {
                    let filesHtml = '<div class="result-section">';
                    result.files.forEach(file => {
                        const url = file.url;
                        const isPdf = file.name.endsWith('.pdf');
                        const chartName = file.name.replace(/^assess_|^spc_|^regression_|^capability_|^heatmap_/, '').replace('.png', '').replace('.pdf', '');
                        filesHtml += `
                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h5 class="mb-0"><span class="badge-chart">${chartName}</span> ${file.name}</h5>
                                    <a href="${url}" target="_blank" class="btn btn-sm btn-outline-primary" download>
                                        <i class="bi bi-download"></i> 下载
                                    </a>
                                </div>
                        `;
                        if (isPdf) {
                            filesHtml += `
                                <iframe class="result-pdf" src="${url}" frameborder="0">
                                    您的浏览器不支持 iframe，请 <a href="${url}" target="_blank">点击下载</a> 查看。
                                </iframe>
                            `;
                        } else {
                            filesHtml += `
                                <img src="${url}" class="result-image" alt="${file.name}" loading="lazy">
                            `;
                        }
                        filesHtml += '</div>';
                    });
                    filesHtml += '</div>';
                    panelCharts.innerHTML += filesHtml;
                } else {
                    panelCharts.innerHTML += `<p class="text-muted">暂无图表文件</p>`;
                }
                
                if (result.message) {
                    panelReport.innerHTML += `
                        <div class="alert alert-success alert-custom">
                            <i class="bi bi-check-circle-fill"></i> ${result.message}
                        </div>
                    `;
                }
                
                document.getElementById('results').style.display = 'block';
                document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }}
        

        // Tab 切换逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.result-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // 移除所有 active 状态
                    document.querySelectorAll('.result-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.result-panel').forEach(p => p.classList.remove('active'));
                    
                    // 激活当前 tab
                    tab.classList.add('active');
                    const targetPanel = document.getElementById('panel-' + tab.dataset.tab);
                    if (targetPanel) targetPanel.classList.add('active');
                });
            });
        });
        
        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `
                <div class="alert alert-error-custom">
                    <i class="bi bi-exclamation-triangle-fill"></i> <strong>错误:</strong> ${message}
                </div>
            `;
            container.scrollIntoView({ behavior: 'smooth' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // 分布迷你图表 (ECharts)
        // ============================================
        async function fetchAndRenderDistributionChart(meta) {
            const container = document.getElementById('distribution-chart-container');
            if (!container) return;
            
            try {
                const resp = await fetch(`/api/data?filename=${encodeURIComponent(meta.filename)}&column=${encodeURIComponent(meta.column)}`);
                if (!resp.ok) throw new Error('无法获取数据');
                const json = await resp.json();
                const data = json.data;
                renderDistributionChart(container, data, meta.analysis_type === 'stats' ? result.result : null);
            } catch (err) {
                console.error('分布图加载失败:', err);
                container.innerHTML = `<div class="text-muted text-center py-4">分布图加载失败: ${err.message}</div>`;
            }
        }
        
        function getThemeColors() {
            const root = document.documentElement;
            const style = getComputedStyle(root);
            return {
                primary: style.getPropertyValue('--echarts-industrial-blue-1').trim() || '#0052cc',
                primaryLight: style.getPropertyValue('--echarts-industrial-blue-8').trim() || '#e6effc',
                text: style.getPropertyValue('--echarts-text').trim() || '#4b5563',
                axis: style.getPropertyValue('--echarts-axis').trim() || '#9ca3af',
                grid: style.getPropertyValue('--echarts-grid').trim() || '#e5e7eb'
            };
        }
        
        function renderDistributionChart(container, data, stats) {
            const chart = echarts.init(container);
            const colors = getThemeColors();
            
            // 简单的分箱算法
            const min = Math.min(...data);
            const max = Math.max(...data);
            const binCount = Math.min(20, Math.floor(Math.sqrt(data.length)));
            const binSize = (max - min) / binCount || 1;
            const bins = Array(binCount).fill(0);
            const binEdges = [];
            for (let i = 0; i < binCount; i++) {
                const left = min + i * binSize;
                const right = left + binSize;
                binEdges.push(i === binCount - 1 ? `${left.toFixed(2)}+` : `${left.toFixed(2)}-${right.toFixed(2)}`);
            }
            for (const v of data) {
                let idx = Math.floor((v - min) / binSize);
                if (idx >= binCount) idx = binCount - 1;
                bins[idx]++;
            }
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                grid: {
                    left: '3%', right: '4%', bottom: '3%', top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: binEdges,
                    axisLine: { lineStyle: { color: colors.axis } },
                    axisLabel: { color: colors.text, fontSize: 10 },
                    axisTick: { alignWithLabel: true }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { type: 'dashed', color: colors.grid } },
                    axisLine: { lineStyle: { color: colors.axis } },
                    axisLabel: { color: colors.text }
                },
                series: [{
                    name: '频数',
                    type: 'bar',
                    data: bins,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: colors.primary },
                            { offset: 1, color: colors.primaryLight }
                        ])
                    },
                    barWidth: '80%'
                }]
            };
            
            // 标注统计线 (均值、标准差范围)
            if (stats && stats.mean !== undefined) {
                const meanVal = stats.mean;
                const stdVal = stats.std || 0;
                const yAxisMax = Math.max(...bins) * 1.1;
                
                // 均值线
                option.graphic = option.graphic || [];
                // ECharts 不方便直接在 bar 图上加 x 轴垂直线，需要 markLine
                option.series[0].markLine = {
                    symbol: ['none', 'none'],
                    label: { show: true, position: 'end', color: colors.text },
                    lineStyle: { color: colors.primary, type: 'dashed', width: 2 },
                    data: [
                        { xAxis: 'mean', name: '均值' }
                    ],
                    // 需要计算 xAxis 索引位置；由于 xAxis 是类目型，需要转换
                };
                // 由于类目轴，我们使用 data 中的 computed position 更简单：改用 visualMap 或辅助 series？
                // 简化：不在 xAxis 标线，而是添加第二个 series 作为 mean 位置的 marker?
                // 或者直接用 axisPointer 的 label 显示？
                // 简单方案：不添加 markLine，改用 tooltip 显示 mean 和 std 信息；或者在图表下方显示统计信息文本
                // 由于时间有限，此处省略复杂标记，仅展示分布
            }
            
            chart.setOption(option);
            // 响应式
            window.addEventListener('resize', () => chart.resize());
        }
        
        // ============================================
        // 主题切换 (Dark Mode)
        // ============================================
        (function() {
            const THEME_KEY = 'industrial-theme';
            const themeToggle = document.getElementById('theme-toggle');
            
            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                const icon = themeToggle.querySelector('i');
                if (theme === 'dark') {
                    icon.className = 'bi bi-sun';
                    themeToggle.title = '切换到亮色模式';
                } else {
                    icon.className = 'bi bi-moon';
                    themeToggle.title = '切换到暗色模式';
                }
                localStorage.setItem(THEME_KEY, theme);
            }
            
            // 初始化：读取用户偏好或系统偏好
            const savedTheme = localStorage.getItem(THEME_KEY);
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = savedTheme || (systemDark ? 'dark' : 'light');
            applyTheme(initialTheme);
            
            // 绑定点击事件
            themeToggle.addEventListener('click', function() {
                const current = document.documentElement.getAttribute('data-theme') || 'light';
                const next = current === 'dark' ? 'light' : 'dark';
                applyTheme(next);
            });
        })();
    </script>
</body>
</html>
